name: provchain-build-and-attest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deterministic archives
        run: python scripts/build_fixture.py

      - name: Record artifact digests
        run: sha256sum dist/*.zip > dist/SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Keylessly sign the complete artifact manifest with Sigstore
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.sigstore.json dist/SHA256SUMS

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: provchain-attested-build
          path: dist/
          if-no-files-found: error

      - name: Create SLSA build provenance attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*.zip'
